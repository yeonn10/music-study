<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>음악의 세계와 감상 — 시험 대비</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;700;900&family=Noto+Serif+KR:wght@300;400;600&family=Space+Mono&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #0e0c0a; --surface: #1a1714; --surface2: #242019;
    --gold: #c9a84c; --gold-light: #e8c96e; --cream: #f0e8d8;
    --muted: #7a7060; --red: #c44b3a; --green: #4a9e6a; --border: #2e2a22;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { background: var(--bg); color: var(--cream); font-family: 'Noto Serif KR', serif; min-height: 100vh; overflow-x: hidden; font-size: 14px; }
  header { text-align: center; padding: 32px 20px 24px; border-bottom: 1px solid var(--border); }
  .subtitle { font-family: 'Space Mono', monospace; font-size: 10px; letter-spacing: 4px; color: var(--gold); text-transform: uppercase; margin-bottom: 10px; }
  h1 { font-family: 'Playfair Display', serif; font-size: clamp(24px, 5vw, 42px); font-weight: 900; color: var(--cream); }
  h1 span { color: var(--gold); }
  .header-meta { margin-top: 8px; font-size: 11px; color: var(--muted); font-family: 'Space Mono', monospace; }
  nav { display: flex; justify-content: center; gap: 4px; padding: 20px 20px 0; }
  .tab-btn { background: none; border: 1px solid var(--border); color: var(--muted); font-family: 'Space Mono', monospace; font-size: 11px; letter-spacing: 2px; padding: 10px 20px; cursor: pointer; text-transform: uppercase; transition: all .2s; }
  .tab-btn.active { background: var(--gold); border-color: var(--gold); color: var(--bg); }
  .tab-btn:hover:not(.active) { border-color: var(--gold); color: var(--gold); }
  main { max-width: 860px; margin: 0 auto; padding: 24px 16px 160px; }
  .tab-content { display: none; }
  .tab-content.active { display: block; }

  /* LIST */
  .list-filters { display: flex; gap: 6px; margin-bottom: 20px; flex-wrap: wrap; }
  .filter-btn { background: var(--surface); border: 1px solid var(--border); color: var(--muted); font-family: 'Space Mono', monospace; font-size: 10px; letter-spacing: 1px; padding: 6px 12px; cursor: pointer; transition: all .2s; text-transform: uppercase; }
  .filter-btn.active, .filter-btn:hover { border-color: var(--gold); color: var(--gold); }
  .piece-card { display: flex; align-items: flex-start; gap: 12px; padding: 14px 16px; border: 1px solid var(--border); background: var(--surface); margin-bottom: 6px; cursor: pointer; transition: all .2s; position: relative; overflow: hidden; }
  .piece-card::before { content: ''; position: absolute; left: 0; top: 0; bottom: 0; width: 3px; background: var(--gold); transform: scaleY(0); transition: transform .2s; }
  .piece-card:hover { background: var(--surface2); border-color: var(--gold); }
  .piece-card:hover::before { transform: scaleY(1); }
  .piece-num { font-family: 'Space Mono', monospace; font-size: 10px; color: var(--gold); min-width: 24px; margin-top: 2px; }
  .piece-info { flex: 1; }
  .piece-composer { font-size: 10px; color: var(--gold-light); font-family: 'Space Mono', monospace; letter-spacing: 1px; margin-bottom: 3px; }
  .piece-title { font-size: 14px; color: var(--cream); line-height: 1.4; }
  .piece-time { font-family: 'Space Mono', monospace; font-size: 9px; color: var(--muted); margin-top: 3px; }
  .piece-video-tag { font-family: 'Space Mono', monospace; font-size: 9px; padding: 2px 5px; border: 1px solid var(--border); color: var(--muted); min-width: 28px; text-align: center; }
  .section-header { font-family: 'Playfair Display', serif; font-size: 12px; color: var(--gold); letter-spacing: 3px; text-transform: uppercase; margin: 20px 0 10px; padding-bottom: 6px; border-bottom: 1px solid var(--border); }

  /* PLAYER */
  #player-container { position: fixed; bottom: 0; left: 0; right: 0; background: var(--surface2); border-top: 1px solid var(--gold); padding: 14px 20px; z-index: 100; display: none; flex-direction: column; gap: 10px; }
  #player-container.visible { display: flex; }
  .player-top { display: flex; align-items: center; gap: 12px; }
  #player-info { flex: 1; min-width: 0; }
  #player-composer { font-size: 10px; color: var(--gold); font-family: 'Space Mono', monospace; }
  #player-title { font-size: 13px; color: var(--cream); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  .close-player { background: none; border: 1px solid var(--border); color: var(--muted); font-size: 14px; width: 28px; height: 28px; cursor: pointer; display: flex; align-items: center; justify-content: center; flex-shrink: 0; }
  .close-player:hover { border-color: var(--red); color: var(--red); }
  #list-audio { width: 100%; accent-color: var(--gold); }

  /* QUIZ SETTINGS */
  .quiz-settings { background: var(--surface); border: 1px solid var(--border); padding: 20px; margin-bottom: 20px; }
  .quiz-settings h3 { font-family: 'Playfair Display', serif; color: var(--gold); margin-bottom: 14px; font-size: 17px; }
  .settings-row { display: flex; gap: 10px; flex-wrap: wrap; margin-bottom: 14px; }
  .setting-group { display: flex; flex-direction: column; gap: 5px; }
  .setting-group label { font-family: 'Space Mono', monospace; font-size: 9px; color: var(--muted); letter-spacing: 1px; text-transform: uppercase; }
  .setting-group select { background: var(--surface2); border: 1px solid var(--border); color: var(--cream); font-family: 'Space Mono', monospace; font-size: 12px; padding: 7px 10px; cursor: pointer; }
  .video-checkboxes { display: flex; gap: 12px; flex-wrap: wrap; }
  .video-check { display: flex; align-items: center; gap: 6px; cursor: pointer; font-size: 13px; }
  .video-check input { accent-color: var(--gold); }
  .start-btn { background: var(--gold); border: none; color: var(--bg); font-family: 'Playfair Display', serif; font-size: 15px; font-weight: 700; padding: 12px 0; cursor: pointer; width: 100%; transition: all .2s; letter-spacing: 1px; margin-top: 4px; }
  .start-btn:hover { background: var(--gold-light); }

  /* QUIZ AREA */
  #quiz-area { display: none; }
  #quiz-area.active { display: block; }
  .quiz-progress { font-family: 'Space Mono', monospace; font-size: 11px; color: var(--muted); margin-bottom: 14px; display: flex; justify-content: space-between; }
  .progress-bar { height: 2px; background: var(--border); margin-bottom: 20px; }
  .progress-fill { height: 100%; background: var(--gold); transition: width .3s; }
  .quiz-type-badge { font-family: 'Space Mono', monospace; font-size: 9px; letter-spacing: 2px; padding: 3px 8px; border: 1px solid var(--gold); color: var(--gold); display: inline-block; margin-bottom: 12px; text-transform: uppercase; }
  .quiz-question-box { background: var(--surface); border: 1px solid var(--border); padding: 20px; margin-bottom: 16px; }
  .quiz-question-text { font-family: 'Playfair Display', serif; font-size: 17px; color: var(--cream); line-height: 1.4; margin-bottom: 16px; }

  /* AUDIO PLAYER */
  .audio-player-box { background: var(--surface2); border: 1px solid var(--border); padding: 16px; margin-bottom: 4px; }
  .audio-player-box audio { width: 100%; accent-color: var(--gold); }
  .audio-time-info { font-family: 'Space Mono', monospace; font-size: 10px; color: var(--gold); margin-bottom: 8px; }

  /* 보기 */
  .exam-columns { display: grid; grid-template-columns: 1fr 1fr; gap: 16px; margin-bottom: 16px; }
  .exam-col-title { font-family: 'Space Mono', monospace; font-size: 9px; color: var(--muted); letter-spacing: 2px; text-transform: uppercase; margin-bottom: 8px; }
  .exam-list { display: flex; flex-direction: column; gap: 4px; }
  .exam-item { display: flex; align-items: flex-start; gap: 8px; padding: 8px 10px; border: 1px solid var(--border); background: var(--surface); font-size: 12px; line-height: 1.4; }
  .exam-key { font-family: 'Space Mono', monospace; font-size: 11px; color: var(--gold); min-width: 20px; flex-shrink: 0; margin-top: 1px; }

  /* 답 입력 */
  .answer-area { background: var(--surface); border: 1px solid var(--border); padding: 16px; margin-bottom: 16px; }
  .answer-area-title { font-family: 'Space Mono', monospace; font-size: 10px; color: var(--muted); letter-spacing: 2px; text-transform: uppercase; margin-bottom: 12px; }
  .answer-inputs { display: flex; align-items: center; gap: 10px; flex-wrap: wrap; }
  .answer-label { font-family: 'Space Mono', monospace; font-size: 12px; color: var(--cream); }
  .answer-select { background: var(--surface2); border: 1px solid var(--gold); color: var(--cream); font-family: 'Space Mono', monospace; font-size: 13px; padding: 8px 10px; cursor: pointer; min-width: 80px; }
  .answer-select:focus { outline: none; border-color: var(--gold-light); }
  .submit-btn { background: var(--gold); border: none; color: var(--bg); font-family: 'Space Mono', monospace; font-size: 12px; letter-spacing: 2px; padding: 12px 0; cursor: pointer; text-transform: uppercase; transition: all .2s; margin-top: 12px; width: 100%; }
  .submit-btn:hover { background: var(--gold-light); }
  .submit-btn:disabled { background: var(--border); color: var(--muted); cursor: default; }

  .quiz-feedback { padding: 14px 16px; border: 1px solid var(--border); margin-bottom: 14px; display: none; font-size: 13px; line-height: 1.6; }
  .quiz-feedback.correct-fb { border-color: var(--green); color: var(--green); }
  .quiz-feedback.wrong-fb { border-color: var(--red); color: var(--red); }
  .quiz-feedback.show { display: block; }
  .next-btn { background: none; border: 1px solid var(--gold); color: var(--gold); font-family: 'Space Mono', monospace; font-size: 11px; letter-spacing: 2px; padding: 11px 28px; cursor: pointer; text-transform: uppercase; display: none; transition: all .2s; }
  .next-btn.show { display: inline-block; }
  .next-btn:hover { background: var(--gold); color: var(--bg); }

  /* RESULTS */
  #quiz-results { display: none; }
  #quiz-results.show { display: block; }
  .results-box { background: var(--surface); border: 1px solid var(--border); padding: 32px; text-align: center; }
  .results-score { font-family: 'Playfair Display', serif; font-size: 64px; color: var(--gold); font-weight: 900; line-height: 1; }
  .results-label { font-family: 'Space Mono', monospace; font-size: 10px; letter-spacing: 3px; color: var(--muted); text-transform: uppercase; margin-top: 6px; margin-bottom: 20px; }
  .results-breakdown { text-align: left; margin-top: 20px; max-height: 320px; overflow-y: auto; }
  .result-item { padding: 10px 0; border-bottom: 1px solid var(--border); font-size: 12px; }
  .result-item .ri-top { display: flex; gap: 8px; align-items: flex-start; }
  .result-icon { font-size: 13px; flex-shrink: 0; margin-top: 1px; }
  .result-detail { font-size: 11px; color: var(--muted); margin-top: 4px; font-family: 'Space Mono', monospace; }
  .retry-btn { background: var(--gold); border: none; color: var(--bg); font-family: 'Space Mono', monospace; font-size: 11px; letter-spacing: 2px; padding: 11px 28px; cursor: pointer; text-transform: uppercase; margin-top: 20px; transition: all .2s; }
  .retry-btn:hover { background: var(--gold-light); }

  @media (max-width: 500px) { .exam-columns { grid-template-columns: 1fr; } }
</style>
</head>
<body>

<header>
  <p class="subtitle">2026-1 · 기말고사 대비</p>
  <h1>음악의 세계와 <span>감상</span></h1>
  <p class="header-meta">총 38곡 · 영상 3개 · 객관식 퀴즈</p>
</header>

<nav>
  <button class="tab-btn active" onclick="switchTab('list', this)">곡 목록</button>
  <button class="tab-btn" onclick="switchTab('quiz', this)">랜덤 퀴즈</button>
</nav>

<main>
  <div id="tab-list" class="tab-content active">
    <div class="list-filters">
      <button class="filter-btn active" onclick="filterList(0, this)">전체 (38)</button>
      <button class="filter-btn" onclick="filterList(1, this)">영상 I (14)</button>
      <button class="filter-btn" onclick="filterList(2, this)">영상 II (13)</button>
      <button class="filter-btn" onclick="filterList(3, this)">영상 III (11)</button>
    </div>
    <div id="piece-list"></div>
  </div>

  <div id="tab-quiz" class="tab-content">
    <div id="quiz-settings-area">
      <div class="quiz-settings">
        <h3>퀴즈 설정</h3>
        <div class="settings-row">
          <div class="setting-group">
            <label>문제 수</label>
            <select id="quiz-count">
              <option value="5">5문제</option>
              <option value="10" selected>10문제</option>
              <option value="15">15문제</option>
              <option value="38">전체</option>
            </select>
          </div>
          <div class="setting-group">
            <label>보기 수</label>
            <select id="choice-count">
              <option value="4">4개</option>
              <option value="6" selected>6개</option>
              <option value="8">8개</option>
              <option value="10">10개</option>
            </select>
          </div>
        </div>
        <div class="setting-group" style="margin-bottom:14px">
          <label>포함할 영상</label>
          <div class="video-checkboxes">
            <label class="video-check"><input type="checkbox" id="v1" checked> 영상 I</label>
            <label class="video-check"><input type="checkbox" id="v2" checked> 영상 II</label>
            <label class="video-check"><input type="checkbox" id="v3" checked> 영상 III</label>
          </div>
        </div>
        <button class="start-btn" onclick="startQuiz()">퀴즈 시작 ▶</button>
      </div>
    </div>

    <div id="quiz-area">
      <div class="quiz-progress">
        <span id="q-counter">1 / 10</span>
        <span id="q-score-live">정답: 0</span>
      </div>
      <div class="progress-bar"><div class="progress-fill" id="progress-fill"></div></div>
      <div class="quiz-type-badge">작곡가 · 제목 매칭</div>

      <div class="quiz-question-box">
        <div class="quiz-question-text">다음 음악을 듣고 작곡가와 제목을 고르세요.</div>
        <div class="audio-player-box">
          <div class="audio-time-info" id="q-time-info"></div>
          <audio id="quiz-audio" controls></audio>
        </div>
      </div>

      <div class="exam-columns">
        <div>
          <div class="exam-col-title">작곡가</div>
          <div class="exam-list" id="composer-list"></div>
        </div>
        <div>
          <div class="exam-col-title">제목</div>
          <div class="exam-list" id="title-list"></div>
        </div>
      </div>

      <div class="answer-area">
        <div class="answer-area-title">정답 입력</div>
        <div class="answer-inputs">
          <span class="answer-label">작곡가</span>
          <select class="answer-select" id="ans-composer"><option value="">선택</option></select>
          <span class="answer-label" style="margin-left:12px">제목</span>
          <select class="answer-select" id="ans-title"><option value="">선택</option></select>
        </div>
        <button class="submit-btn" id="submit-btn" onclick="submitAnswer()">제출하기</button>
      </div>

      <div class="quiz-feedback" id="quiz-feedback"></div>
      <button class="next-btn" id="next-btn" onclick="nextQuestion()">다음 문제 →</button>
    </div>

    <div id="quiz-results">
      <div class="results-box">
        <div class="results-score" id="final-score">0</div>
        <div class="results-label" id="final-label">/ 10 정답</div>
        <p id="final-comment" style="color:var(--muted);font-size:13px;"></p>
        <div class="results-breakdown" id="results-breakdown"></div>
        <button class="retry-btn" onclick="resetQuiz()">다시 풀기</button>
      </div>
    </div>
  </div>
</main>

<!-- 하단 오디오 플레이어 -->
<div id="player-container">
  <div class="player-top">
    <div id="player-info">
      <div id="player-composer"></div>
      <div id="player-title"></div>
    </div>
    <button class="close-player" onclick="closePlayer()">✕</button>
  </div>
  <audio id="list-audio" controls></audio>
</div>

const BASE = 'https://raw.githubusercontent.com/yeonn10/music-study/master/';

// 각 영상의 분할 시간(초)
const SPLIT = { 1: 2330, 2: 2521, 3: 2140 };

// 파일명 반환 + 실제 재생 시작 시간 계산
function getAudioSrc(video, startSec) {
  const split = SPLIT[video];
  if (startSec < split) {
    return { src: BASE + `music-${video}-1.m4a`, time: startSec };
  } else {
    return { src: BASE + `music-${video}-2.m4a`, time: startSec - split };
  }
}

  {id:36, video:3, start:'43:57', end:'45:56', startSec:2637, composer:"Francesco D'Andrea", title:'With Some Malice'},
  {id:37, video:3, start:'46:00', end:'01:09:37', startSec:2760, composer:'Tchaikovsky',     title:'Piano Concerto No.1 Op.23 - 1. Allegro con spirito'},
  {id:38, video:3, start:'01:09:40', end:'01:13:38', startSec:4180, composer:'Khachaturian', title:'Ballet Suite from Masquerade. 1. Waltz'},
];

// ===== LIST =====
function renderList(videoFilter) {
  const container = document.getElementById('piece-list');
  container.innerHTML = '';
  const filtered = videoFilter === 0 ? PIECES : PIECES.filter(p => p.video === videoFilter);
  let lastVideo = null;
  filtered.forEach((p, i) => {
    if (videoFilter === 0 && p.video !== lastVideo) {
      lastVideo = p.video;
      const hdr = document.createElement('div');
      hdr.className = 'section-header';
      hdr.textContent = '영상 ' + ['Ⅰ','Ⅱ','Ⅲ'][p.video-1];
      container.appendChild(hdr);
    }
    const card = document.createElement('div');
    card.className = 'piece-card';
    card.onclick = () => playPiece(p);
    card.innerHTML = `
      <div class="piece-num">${String(i+1).padStart(2,'0')}</div>
      <div class="piece-info">
        <div class="piece-composer">${p.composer}</div>
        <div class="piece-title">${p.title}</div>
        <div class="piece-time">⏱ ${p.start} – ${p.end}</div>
      </div>
      <div class="piece-video-tag">V${p.video}</div>
    `;
    container.appendChild(card);
  });
}

function filterList(v, btn) {
  document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  renderList(v);
}

function playPiece(p) {
  const { src, time } = getAudioSrc(p.video, p.startSec);
  const audio = document.getElementById('list-audio');
  audio.src = src;
  audio.load();
  audio.addEventListener('canplay', function onCanPlay() {
    audio.currentTime = time;
    audio.play();
    audio.removeEventListener('canplay', onCanPlay);
  });
  document.getElementById('player-composer').textContent = p.composer;
  document.getElementById('player-title').textContent = p.title;
  document.getElementById('player-container').classList.add('visible');
}

function closePlayer() {
  const audio = document.getElementById('list-audio');
  audio.pause();
  audio.src = '';
  document.getElementById('player-container').classList.remove('visible');
}

// ===== QUIZ =====
let quizQueue=[], currentQ=0, score=0, quizResults=[], answered=false;
let currentComposers=[], currentTitles=[];

function shuffle(arr) {
  const a=[...arr];
  for(let i=a.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[a[i],a[j]]=[a[j],a[i]];}
  return a;
}

function getEnabledPieces() {
  const v1=document.getElementById('v1').checked;
  const v2=document.getElementById('v2').checked;
  const v3=document.getElementById('v3').checked;
  return PIECES.filter(p=>(p.video===1&&v1)||(p.video===2&&v2)||(p.video===3&&v3));
}

function startQuiz() {
  const pool = getEnabledPieces();
  if(pool.length < 4){ alert('최소 4곡 이상 포함된 영상을 선택해주세요.'); return; }
  const count = Math.min(parseInt(document.getElementById('quiz-count').value), pool.length);
  const choiceN = parseInt(document.getElementById('choice-count').value);

  quizQueue = shuffle(pool).slice(0, count).map(piece => {
    const others = shuffle(PIECES.filter(p => p.id !== piece.id));
    const wrongPieces = others.slice(0, choiceN - 1);
    const composerOptions = shuffle([piece.composer, ...wrongPieces.map(w => w.composer)]);
    const titleOptions = shuffle([piece.title, ...wrongPieces.map(w => w.title)]);
    return { piece, composerOptions, titleOptions };
  });

  currentQ=0; score=0; quizResults=[];
  document.getElementById('quiz-settings-area').style.display='none';
  document.getElementById('quiz-area').classList.add('active');
  document.getElementById('quiz-results').classList.remove('show');
  renderQuestion();
}

function renderQuestion() {
  if(currentQ >= quizQueue.length){ showResults(); return; }
  answered = false;

  const q = quizQueue[currentQ];
  const total = quizQueue.length;

  document.getElementById('q-counter').textContent = `${currentQ+1} / ${total}`;
  document.getElementById('q-score-live').textContent = `정답: ${score}`;
  document.getElementById('progress-fill').style.width = `${(currentQ/total)*100}%`;
  document.getElementById('q-time-info').textContent = '';

  // 오디오 세팅
  const { src, time } = getAudioSrc(q.piece.video, q.piece.startSec);
  const audio = document.getElementById('quiz-audio');
  audio.src = src;
  audio.load();
  audio.addEventListener('canplay', function onCanPlay() {
    audio.currentTime = time;
    audio.removeEventListener('canplay', onCanPlay);
  });

  // 작곡가 보기
  currentComposers = q.composerOptions;
  const cList = document.getElementById('composer-list');
  cList.innerHTML = '';
  currentComposers.forEach((c, i) => {
    const div = document.createElement('div');
    div.className = 'exam-item';
    div.innerHTML = `<span class="exam-key">${ALPHA[i]}</span><span>${c}</span>`;
    cList.appendChild(div);
  });

  // 제목 보기
  currentTitles = q.titleOptions;
  const tList = document.getElementById('title-list');
  tList.innerHTML = '';
  currentTitles.forEach((t, i) => {
    const div = document.createElement('div');
    div.className = 'exam-item';
    div.innerHTML = `<span class="exam-key">${i+1}</span><span>${t}</span>`;
    tList.appendChild(div);
  });

  // 드롭다운
  const cSel = document.getElementById('ans-composer');
  const tSel = document.getElementById('ans-title');
  cSel.innerHTML = '<option value="">선택</option>';
  currentComposers.forEach((_, i) => { cSel.innerHTML += `<option value="${i}">${ALPHA[i]}</option>`; });
  tSel.innerHTML = '<option value="">선택</option>';
  currentTitles.forEach((_, i) => { tSel.innerHTML += `<option value="${i}">${i+1}</option>`; });
  cSel.disabled = false;
  tSel.disabled = false;

  document.getElementById('submit-btn').disabled = false;
  document.getElementById('quiz-feedback').className = 'quiz-feedback';
  document.getElementById('next-btn').classList.remove('show');
}

function submitAnswer() {
  if(answered) return;
  const cIdx = parseInt(document.getElementById('ans-composer').value);
  const tIdx = parseInt(document.getElementById('ans-title').value);
  if(isNaN(cIdx) || isNaN(tIdx)) { alert('작곡가와 제목을 모두 선택해주세요!'); return; }

  answered = true;
  document.getElementById('ans-composer').disabled = true;
  document.getElementById('ans-title').disabled = true;
  document.getElementById('submit-btn').disabled = true;

  // 오디오 정지
  document.getElementById('quiz-audio').pause();

  const q = quizQueue[currentQ];
  const chosenComposer = currentComposers[cIdx];
  const chosenTitle = currentTitles[tIdx];
  const composerOk = chosenComposer === q.piece.composer;
  const titleOk = chosenTitle === q.piece.title;
  const bothOk = composerOk && titleOk;
  if(bothOk) score++;

  const fb = document.getElementById('quiz-feedback');
  if(bothOk) {
    fb.className = 'quiz-feedback correct-fb show';
    fb.textContent = '✓ 정답! 작곡가와 제목 모두 맞혔어요!';
  } else {
    fb.className = 'quiz-feedback wrong-fb show';
    let msg = '✗ 오답.  ';
    if(!composerOk) msg += `작곡가 정답: ${ALPHA[currentComposers.indexOf(q.piece.composer)]} (${q.piece.composer})  `;
    if(!titleOk) msg += `제목 정답: ${currentTitles.indexOf(q.piece.title)+1} (${q.piece.title.substring(0,40)}${q.piece.title.length>40?'…':''})`;
    fb.textContent = msg;
  }

  quizResults.push({ q, chosenComposer, chosenTitle, composerOk, titleOk, bothOk });
  document.getElementById('q-score-live').textContent = `정답: ${score}`;
  document.getElementById('next-btn').classList.add('show');
}

function nextQuestion(){ currentQ++; renderQuestion(); }

function showResults() {
  document.getElementById('quiz-audio').pause();
  document.getElementById('quiz-area').classList.remove('active');
  const total = quizQueue.length;
  document.getElementById('final-score').textContent = score;
  document.getElementById('final-label').textContent = `/ ${total} 정답`;
  const pct = score/total;
  document.getElementById('final-comment').textContent =
    pct===1 ? '완벽합니다! 🎼 만점이에요!' :
    pct>=0.8 ? '훌륭해요! 시험 잘 볼 것 같은데요?' :
    pct>=0.6 ? '조금만 더 복습하면 될 것 같아요!' :
    '곡 목록 탭에서 다시 한 번 들어보세요 💪';

  const bd = document.getElementById('results-breakdown');
  bd.innerHTML = '<div class="section-header" style="margin-top:0">문제별 결과</div>';
  quizResults.forEach((r,i) => {
    const div = document.createElement('div');
    div.className = 'result-item';
    div.innerHTML = `
      <div class="ri-top">
        <span class="result-icon">${r.bothOk?'✓':'✗'}</span>
        <div>
          <div>${r.q.piece.composer} — ${r.q.piece.title.substring(0,45)}${r.q.piece.title.length>45?'…':''}</div>
          <div class="result-detail">작곡가 ${r.composerOk?'✓':'✗'} · 제목 ${r.titleOk?'✓':'✗'}${!r.composerOk?' | 내 답: '+r.chosenComposer:''}${!r.titleOk?' | 내 답: '+r.chosenTitle.substring(0,30):''}</div>
        </div>
      </div>`;
    bd.appendChild(div);
  });
  document.getElementById('quiz-results').classList.add('show');
}

function resetQuiz() {
  document.getElementById('quiz-results').classList.remove('show');
  document.getElementById('quiz-settings-area').style.display='';
}

function switchTab(name, btn) {
  document.querySelectorAll('.tab-content').forEach(t=>t.classList.remove('active'));
  document.querySelectorAll('.tab-btn').forEach(b=>b.classList.remove('active'));
  document.getElementById('tab-'+name).classList.add('active');
  btn.classList.add('active');
}

renderList(0);
</script>
