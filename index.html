<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>음악의 세계와 감상 — 시험 대비</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;700;900&family=Noto+Serif+KR:wght@300;400;600&family=Space+Mono&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #0e0c0a;
    --surface: #1a1714;
    --surface2: #242019;
    --gold: #c9a84c;
    --gold-light: #e8c96e;
    --cream: #f0e8d8;
    --muted: #7a7060;
    --red: #c44b3a;
    --green: #4a9e6a;
    --border: #2e2a22;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    background: var(--bg);
    color: var(--cream);
    font-family: 'Noto Serif KR', serif;
    min-height: 100vh;
    overflow-x: hidden;
  }

  /* Grain overlay */
  body::before {
    content: '';
    position: fixed;
    inset: 0;
    background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noise)' opacity='0.04'/%3E%3C/svg%3E");
    pointer-events: none;
    z-index: 0;
  }

  header {
    position: relative;
    text-align: center;
    padding: 60px 20px 40px;
    border-bottom: 1px solid var(--border);
    overflow: hidden;
  }

  header::after {
    content: '♩';
    position: absolute;
    font-size: 300px;
    color: rgba(201,168,76,0.03);
    top: -60px; right: -40px;
    pointer-events: none;
    font-family: serif;
  }

  .subtitle {
    font-family: 'Space Mono', monospace;
    font-size: 11px;
    letter-spacing: 4px;
    color: var(--gold);
    text-transform: uppercase;
    margin-bottom: 16px;
  }

  h1 {
    font-family: 'Playfair Display', serif;
    font-size: clamp(28px, 6vw, 52px);
    font-weight: 900;
    line-height: 1.1;
    color: var(--cream);
  }

  h1 span { color: var(--gold); }

  .header-meta {
    margin-top: 14px;
    font-size: 12px;
    color: var(--muted);
    font-family: 'Space Mono', monospace;
  }

  /* Tabs */
  nav {
    display: flex;
    justify-content: center;
    gap: 4px;
    padding: 24px 20px 0;
    position: relative;
    z-index: 1;
  }

  .tab-btn {
    background: none;
    border: 1px solid var(--border);
    color: var(--muted);
    font-family: 'Space Mono', monospace;
    font-size: 11px;
    letter-spacing: 2px;
    padding: 10px 20px;
    cursor: pointer;
    text-transform: uppercase;
    transition: all .2s;
  }

  .tab-btn.active {
    background: var(--gold);
    border-color: var(--gold);
    color: var(--bg);
  }

  .tab-btn:hover:not(.active) {
    border-color: var(--gold);
    color: var(--gold);
  }

  /* Main content */
  main {
    max-width: 900px;
    margin: 0 auto;
    padding: 32px 20px 80px;
    position: relative;
    z-index: 1;
  }

  .tab-content { display: none; }
  .tab-content.active { display: block; }

  /* ========== LIST TAB ========== */
  .list-filters {
    display: flex;
    gap: 8px;
    margin-bottom: 24px;
    flex-wrap: wrap;
  }

  .filter-btn {
    background: var(--surface);
    border: 1px solid var(--border);
    color: var(--muted);
    font-family: 'Space Mono', monospace;
    font-size: 10px;
    letter-spacing: 1px;
    padding: 6px 14px;
    cursor: pointer;
    transition: all .2s;
    text-transform: uppercase;
  }

  .filter-btn.active, .filter-btn:hover {
    border-color: var(--gold);
    color: var(--gold);
  }

  .piece-card {
    display: flex;
    align-items: flex-start;
    gap: 16px;
    padding: 16px 20px;
    border: 1px solid var(--border);
    background: var(--surface);
    margin-bottom: 8px;
    cursor: pointer;
    transition: all .2s;
    position: relative;
    overflow: hidden;
  }

  .piece-card::before {
    content: '';
    position: absolute;
    left: 0; top: 0; bottom: 0;
    width: 3px;
    background: var(--gold);
    transform: scaleY(0);
    transition: transform .2s;
  }

  .piece-card:hover {
    background: var(--surface2);
    border-color: var(--gold);
  }

  .piece-card:hover::before { transform: scaleY(1); }

  .piece-num {
    font-family: 'Space Mono', monospace;
    font-size: 11px;
    color: var(--gold);
    min-width: 28px;
    margin-top: 2px;
  }

  .piece-info { flex: 1; }

  .piece-composer {
    font-size: 11px;
    color: var(--gold-light);
    font-family: 'Space Mono', monospace;
    letter-spacing: 1px;
    margin-bottom: 4px;
  }

  .piece-title {
    font-size: 15px;
    color: var(--cream);
    line-height: 1.4;
  }

  .piece-time {
    font-family: 'Space Mono', monospace;
    font-size: 10px;
    color: var(--muted);
    margin-top: 4px;
  }

  .piece-video-tag {
    font-family: 'Space Mono', monospace;
    font-size: 9px;
    padding: 2px 6px;
    border: 1px solid var(--border);
    color: var(--muted);
    min-width: 32px;
    text-align: center;
    margin-top: 2px;
  }

  /* Player */
  #player-container {
    position: fixed;
    bottom: 0; left: 0; right: 0;
    background: var(--surface2);
    border-top: 1px solid var(--gold);
    padding: 12px 20px;
    z-index: 100;
    display: none;
    align-items: center;
    gap: 16px;
  }

  #player-container.visible { display: flex; }

  #player-info { flex: 1; min-width: 0; }
  #player-composer { font-size: 10px; color: var(--gold); font-family: 'Space Mono', monospace; }
  #player-title { font-size: 13px; color: var(--cream); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }

  #youtube-player {
    width: 180px;
    height: 100px;
    flex-shrink: 0;
  }

  .close-player {
    background: none;
    border: 1px solid var(--border);
    color: var(--muted);
    font-size: 16px;
    width: 32px; height: 32px;
    cursor: pointer;
    display: flex; align-items: center; justify-content: center;
    flex-shrink: 0;
  }

  .close-player:hover { border-color: var(--red); color: var(--red); }

  /* ========== QUIZ TAB ========== */
  .quiz-settings {
    background: var(--surface);
    border: 1px solid var(--border);
    padding: 24px;
    margin-bottom: 24px;
  }

  .quiz-settings h3 {
    font-family: 'Playfair Display', serif;
    color: var(--gold);
    margin-bottom: 16px;
    font-size: 18px;
  }

  .settings-row {
    display: flex;
    gap: 12px;
    flex-wrap: wrap;
    margin-bottom: 16px;
  }

  .setting-group { display: flex; flex-direction: column; gap: 6px; }
  .setting-group label {
    font-family: 'Space Mono', monospace;
    font-size: 10px;
    color: var(--muted);
    letter-spacing: 1px;
    text-transform: uppercase;
  }

  .setting-group select {
    background: var(--surface2);
    border: 1px solid var(--border);
    color: var(--cream);
    font-family: 'Space Mono', monospace;
    font-size: 12px;
    padding: 8px 12px;
    cursor: pointer;
  }

  .video-checkboxes {
    display: flex;
    gap: 12px;
    flex-wrap: wrap;
  }

  .video-check {
    display: flex;
    align-items: center;
    gap: 8px;
    cursor: pointer;
    font-size: 13px;
  }

  .video-check input { accent-color: var(--gold); }

  .start-btn {
    background: var(--gold);
    border: none;
    color: var(--bg);
    font-family: 'Playfair Display', serif;
    font-size: 16px;
    font-weight: 700;
    padding: 14px 40px;
    cursor: pointer;
    width: 100%;
    transition: all .2s;
    letter-spacing: 1px;
  }

  .start-btn:hover { background: var(--gold-light); }

  /* Quiz question */
  #quiz-area { display: none; }
  #quiz-area.active { display: block; }

  .quiz-progress {
    font-family: 'Space Mono', monospace;
    font-size: 11px;
    color: var(--muted);
    margin-bottom: 20px;
    display: flex;
    justify-content: space-between;
    align-items: center;
  }

  .progress-bar {
    height: 2px;
    background: var(--border);
    margin-bottom: 24px;
    position: relative;
  }

  .progress-fill {
    height: 100%;
    background: var(--gold);
    transition: width .3s;
  }

  .quiz-type-badge {
    font-family: 'Space Mono', monospace;
    font-size: 9px;
    letter-spacing: 2px;
    padding: 4px 10px;
    border: 1px solid var(--gold);
    color: var(--gold);
    display: inline-block;
    margin-bottom: 16px;
    text-transform: uppercase;
  }

  .quiz-question-box {
    background: var(--surface);
    border: 1px solid var(--border);
    padding: 28px;
    margin-bottom: 20px;
    min-height: 140px;
    display: flex;
    flex-direction: column;
    gap: 12px;
  }

  .quiz-question-text {
    font-family: 'Playfair Display', serif;
    font-size: 20px;
    color: var(--cream);
    line-height: 1.4;
  }

  .quiz-player-area {
    margin-top: 8px;
  }

  #quiz-youtube {
    width: 100%;
    max-width: 480px;
    height: 270px;
  }

  .play-hint {
    font-size: 12px;
    color: var(--muted);
    font-family: 'Space Mono', monospace;
    margin-top: 8px;
  }

  .options-grid {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 10px;
    margin-bottom: 20px;
  }

  .option-btn {
    background: var(--surface);
    border: 1px solid var(--border);
    color: var(--cream);
    font-family: 'Noto Serif KR', serif;
    font-size: 13px;
    padding: 16px 20px;
    text-align: left;
    cursor: pointer;
    transition: all .15s;
    line-height: 1.4;
    position: relative;
  }

  .option-btn .opt-label {
    font-family: 'Space Mono', monospace;
    font-size: 10px;
    color: var(--gold);
    display: block;
    margin-bottom: 4px;
  }

  .option-btn:hover:not(:disabled) {
    border-color: var(--gold);
    background: var(--surface2);
  }

  .option-btn.correct {
    border-color: var(--green);
    background: rgba(74,158,106,0.15);
  }

  .option-btn.wrong {
    border-color: var(--red);
    background: rgba(196,75,58,0.15);
  }

  .option-btn:disabled { cursor: default; }

  .quiz-feedback {
    padding: 16px 20px;
    border: 1px solid var(--border);
    margin-bottom: 16px;
    display: none;
    font-size: 14px;
    line-height: 1.6;
  }

  .quiz-feedback.correct-fb { border-color: var(--green); color: var(--green); }
  .quiz-feedback.wrong-fb { border-color: var(--red); color: var(--red); }
  .quiz-feedback.show { display: block; }

  .next-btn {
    background: none;
    border: 1px solid var(--gold);
    color: var(--gold);
    font-family: 'Space Mono', monospace;
    font-size: 12px;
    letter-spacing: 2px;
    padding: 12px 32px;
    cursor: pointer;
    text-transform: uppercase;
    display: none;
    transition: all .2s;
  }

  .next-btn.show { display: inline-block; }
  .next-btn:hover { background: var(--gold); color: var(--bg); }

  /* Results */
  #quiz-results { display: none; }
  #quiz-results.show { display: block; }

  .results-box {
    background: var(--surface);
    border: 1px solid var(--border);
    padding: 40px;
    text-align: center;
  }

  .results-score {
    font-family: 'Playfair Display', serif;
    font-size: 72px;
    color: var(--gold);
    font-weight: 900;
    line-height: 1;
  }

  .results-label {
    font-family: 'Space Mono', monospace;
    font-size: 11px;
    letter-spacing: 3px;
    color: var(--muted);
    text-transform: uppercase;
    margin-top: 8px;
    margin-bottom: 24px;
  }

  .results-breakdown {
    text-align: left;
    margin-top: 24px;
    max-height: 300px;
    overflow-y: auto;
  }

  .result-item {
    display: flex;
    align-items: flex-start;
    gap: 12px;
    padding: 10px 0;
    border-bottom: 1px solid var(--border);
    font-size: 13px;
  }

  .result-icon { font-size: 14px; flex-shrink: 0; margin-top: 1px; }

  .retry-btn {
    background: var(--gold);
    border: none;
    color: var(--bg);
    font-family: 'Space Mono', monospace;
    font-size: 12px;
    letter-spacing: 2px;
    padding: 12px 32px;
    cursor: pointer;
    text-transform: uppercase;
    margin-top: 24px;
    transition: all .2s;
  }

  .retry-btn:hover { background: var(--gold-light); }

  /* Section headers */
  .section-header {
    font-family: 'Playfair Display', serif;
    font-size: 13px;
    color: var(--gold);
    letter-spacing: 3px;
    text-transform: uppercase;
    margin: 24px 0 12px;
    padding-bottom: 8px;
    border-bottom: 1px solid var(--border);
  }

  @media (max-width: 600px) {
    .options-grid { grid-template-columns: 1fr; }
    #quiz-youtube { height: 200px; }
    #youtube-player { width: 140px; height: 79px; }
    .quiz-question-text { font-size: 16px; }
  }
</style>
</head>
<body>

<header>
  <p class="subtitle">2026-1 · 기말고사 대비</p>
  <h1>음악의 세계와 <span>감상</span></h1>
  <p class="header-meta">총 38곡 · 영상 3개 · 객관식 퀴즈</p>
</header>

<nav>
  <button class="tab-btn active" onclick="switchTab('list')">곡 목록</button>
  <button class="tab-btn" onclick="switchTab('quiz')">랜덤 퀴즈</button>
</nav>

<main>
  <!-- LIST TAB -->
  <div id="tab-list" class="tab-content active">
    <div class="list-filters">
      <button class="filter-btn active" onclick="filterList(0, this)">전체 (38)</button>
      <button class="filter-btn" onclick="filterList(1, this)">영상 I (14)</button>
      <button class="filter-btn" onclick="filterList(2, this)">영상 II (13)</button>
      <button class="filter-btn" onclick="filterList(3, this)">영상 III (11)</button>
    </div>
    <div id="piece-list"></div>
  </div>

  <!-- QUIZ TAB -->
  <div id="tab-quiz" class="tab-content">
    <div id="quiz-settings-area">
      <div class="quiz-settings">
        <h3>퀴즈 설정</h3>
        <div class="settings-row">
          <div class="setting-group">
            <label>문제 수</label>
            <select id="quiz-count">
              <option value="5">5문제</option>
              <option value="10" selected>10문제</option>
              <option value="15">15문제</option>
              <option value="38">전체</option>
            </select>
          </div>
          <div class="setting-group">
            <label>문제 유형</label>
            <select id="quiz-type">
              <option value="both" selected>혼합</option>
              <option value="composer">작곡가 맞히기</option>
              <option value="title">제목 맞히기</option>
            </select>
          </div>
          <div class="setting-group">
            <label>보기 수</label>
            <select id="choice-count">
              <option value="3">3지선다</option>
              <option value="4" selected>4지선다</option>
              <option value="5">5지선다</option>
            </select>
          </div>
        </div>
        <div class="setting-group" style="margin-bottom:16px">
          <label>포함할 영상</label>
          <div class="video-checkboxes">
            <label class="video-check"><input type="checkbox" id="v1" checked> 영상 I</label>
            <label class="video-check"><input type="checkbox" id="v2" checked> 영상 II</label>
            <label class="video-check"><input type="checkbox" id="v3" checked> 영상 III</label>
          </div>
        </div>
        <button class="start-btn" onclick="startQuiz()">퀴즈 시작 ▶</button>
      </div>
    </div>

    <div id="quiz-area">
      <div class="quiz-progress">
        <span id="q-counter">1 / 10</span>
        <span id="q-score-live">정답: 0</span>
      </div>
      <div class="progress-bar"><div class="progress-fill" id="progress-fill"></div></div>

      <div class="quiz-type-badge" id="q-type-badge">작곡가 맞히기</div>

      <div class="quiz-question-box">
        <div class="quiz-question-text" id="q-text">이 음악의 작곡가는?</div>
        <div class="quiz-player-area">
          <iframe id="quiz-youtube" src="" frameborder="0" allow="autoplay; encrypted-media" allowfullscreen></iframe>
          <p class="play-hint">▶ 위 영상에서 해당 구간을 재생하세요</p>
        </div>
      </div>

      <div class="options-grid" id="options-grid"></div>
      <div class="quiz-feedback" id="quiz-feedback"></div>
      <button class="next-btn" id="next-btn" onclick="nextQuestion()">다음 문제 →</button>
    </div>

    <div id="quiz-results">
      <div class="results-box">
        <div class="results-score" id="final-score">0</div>
        <div class="results-label" id="final-label">/ 10 정답</div>
        <p id="final-comment" style="color:var(--muted);font-size:14px;"></p>
        <div class="results-breakdown" id="results-breakdown"></div>
        <button class="retry-btn" onclick="resetQuiz()">다시 풀기</button>
      </div>
    </div>
  </div>
</main>

<!-- Fixed bottom player -->
<div id="player-container">
  <div id="player-info">
    <div id="player-composer"></div>
    <div id="player-title"></div>
  </div>
  <iframe id="youtube-player" src="" frameborder="0" allow="autoplay; encrypted-media" allowfullscreen></iframe>
  <button class="close-player" onclick="closePlayer()">✕</button>
</div>

// ========== LIST ==========
function renderList(videoFilter) {
  const container = document.getElementById('piece-list');
  container.innerHTML = '';
  const filtered = videoFilter === 0 ? PIECES : PIECES.filter(p => p.video === videoFilter);
  
  let lastVideo = null;
  filtered.forEach((p, i) => {
    if (videoFilter === 0 && p.video !== lastVideo) {
      lastVideo = p.video;
      const hdr = document.createElement('div');
      hdr.className = 'section-header';
      hdr.textContent = `영상 ${'ⅠⅡⅢ'[p.video-1]}`;
      container.appendChild(hdr);
    }
    const card = document.createElement('div');
    card.className = 'piece-card';
    card.onclick = () => playPiece(p);
    card.innerHTML = `
      <div class="piece-num">${String(i+1).padStart(2,'0')}</div>
      <div class="piece-info">
        <div class="piece-composer">${p.composer}</div>
        <div class="piece-title">${p.title}</div>
        <div class="piece-time">⏱ ${p.start} – ${p.end}</div>
      </div>
      <div class="piece-video-tag">V${p.video}</div>
    `;
    container.appendChild(card);
  });
}

function filterList(v, btn) {
  document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  renderList(v);
}

function playPiece(p) {
  const videoId = p.altVideo || VIDEOS[p.video];
  const src = `https://www.youtube.com/embed/${videoId}?start=${p.startSec}&autoplay=1`;
  document.getElementById('youtube-player').src = src;
  document.getElementById('player-composer').textContent = p.composer;
  document.getElementById('player-title').textContent = p.title;
  document.getElementById('player-container').classList.add('visible');
}

function closePlayer() {
  document.getElementById('youtube-player').src = '';
  document.getElementById('player-container').classList.remove('visible');
}

// ========== QUIZ ==========
let quizQueue = [];
let currentQ = 0;
let score = 0;
let quizResults = [];
let answered = false;

function getEnabledPieces() {
  const v1 = document.getElementById('v1').checked;
  const v2 = document.getElementById('v2').checked;
  const v3 = document.getElementById('v3').checked;
  return PIECES.filter(p => (p.video===1&&v1)||(p.video===2&&v2)||(p.video===3&&v3));
}

function shuffle(arr) {
  const a = [...arr];
  for (let i=a.length-1;i>0;i--) {
    const j=Math.floor(Math.random()*(i+1));
    [a[i],a[j]]=[a[j],a[i]];
  }
  return a;
}

function startQuiz() {
  const pool = getEnabledPieces();
  if (pool.length < 4) { alert('최소 4곡 이상 포함된 영상을 선택해주세요.'); return; }

  const count = Math.min(parseInt(document.getElementById('quiz-count').value), pool.length);
  const typeMode = document.getElementById('quiz-type').value;
  const choiceN = parseInt(document.getElementById('choice-count').value);

  quizQueue = shuffle(pool).slice(0, count).map(piece => {
    let type = typeMode;
    if (type === 'both') type = Math.random() < 0.5 ? 'composer' : 'title';
    
    // Generate wrong options
    const others = shuffle(PIECES.filter(p => p.id !== piece.id));
    const wrongs = others.slice(0, choiceN - 1);

    let options, correct;
    if (type === 'composer') {
      correct = piece.composer;
      options = shuffle([correct, ...wrongs.map(w => w.composer)]);
    } else {
      correct = piece.title;
      options = shuffle([correct, ...wrongs.map(w => w.title)]);
    }

    return { piece, type, correct, options };
  });

  currentQ = 0;
  score = 0;
  quizResults = [];

  document.getElementById('quiz-settings-area').style.display = 'none';
  document.getElementById('quiz-area').classList.add('active');
  document.getElementById('quiz-results').classList.remove('show');

  renderQuestion();
}

function renderQuestion() {
  if (currentQ >= quizQueue.length) { showResults(); return; }
  answered = false;

  const q = quizQueue[currentQ];
  const total = quizQueue.length;

  document.getElementById('q-counter').textContent = `${currentQ+1} / ${total}`;
  document.getElementById('q-score-live').textContent = `정답: ${score}`;
  document.getElementById('progress-fill').style.width = `${(currentQ/total)*100}%`;

  const typeLbl = q.type === 'composer' ? '작곡가 맞히기' : '제목 맞히기';
  document.getElementById('q-type-badge').textContent = typeLbl;

  if (q.type === 'composer') {
    document.getElementById('q-text').textContent = `이 음악의 작곡가는 누구일까요?`;
  } else {
    document.getElementById('q-text').innerHTML = `<strong>${q.piece.composer}</strong>의 작품 제목은?`;
  }

  // Set video
  const videoId = q.piece.altVideo || VIDEOS[q.piece.video];
  const src = `https://www.youtube.com/embed/${videoId}?start=${q.piece.startSec}&autoplay=1`;
  document.getElementById('quiz-youtube').src = src;

  // Options
  const grid = document.getElementById('options-grid');
  grid.innerHTML = '';
  const labels = ['A', 'B', 'C', 'D', 'E'];
  q.options.forEach((opt, i) => {
    const btn = document.createElement('button');
    btn.className = 'option-btn';
    btn.innerHTML = `<span class="opt-label">${labels[i]}</span>${opt}`;
    btn.onclick = () => selectAnswer(btn, opt, q);
    grid.appendChild(btn);
  });

  document.getElementById('quiz-feedback').className = 'quiz-feedback';
  document.getElementById('quiz-feedback').textContent = '';
  document.getElementById('next-btn').classList.remove('show');
}

function selectAnswer(btn, chosen, q) {
  if (answered) return;
  answered = true;

  const isCorrect = chosen === q.correct;
  if (isCorrect) score++;

  const allBtns = document.querySelectorAll('.option-btn');
  allBtns.forEach(b => {
    b.disabled = true;
    const txt = b.textContent.replace(/^[ABCDE]/, '').trim();
    if (txt === q.correct) b.classList.add('correct');
  });
  if (!isCorrect) btn.classList.add('wrong');

  const fb = document.getElementById('quiz-feedback');
  if (isCorrect) {
    fb.className = 'quiz-feedback correct-fb show';
    fb.textContent = '✓ 정답입니다!';
  } else {
    fb.className = 'quiz-feedback wrong-fb show';
    fb.textContent = `✗ 오답. 정답: ${q.correct}`;
  }

  quizResults.push({ q, chosen, isCorrect });
  document.getElementById('q-score-live').textContent = `정답: ${score}`;
  document.getElementById('next-btn').classList.add('show');
}

function nextQuestion() {
  currentQ++;
  renderQuestion();
}

function showResults() {
  document.getElementById('quiz-youtube').src = '';
  document.getElementById('quiz-area').classList.remove('active');

  const total = quizQueue.length;
  document.getElementById('final-score').textContent = score;
  document.getElementById('final-label').textContent = `/ ${total} 정답`;

  const pct = score / total;
  let comment = '';
  if (pct === 1) comment = '완벽합니다! 🎼 만점이에요!';
  else if (pct >= 0.8) comment = '훌륭해요! 시험 잘 볼 것 같은데요?';
  else if (pct >= 0.6) comment = '조금만 더 복습하면 될 것 같아요!';
  else comment = '곡 목록 탭에서 다시 한 번 들어보세요 💪';
  document.getElementById('final-comment').textContent = comment;

  const bd = document.getElementById('results-breakdown');
  bd.innerHTML = '<div class="section-header" style="margin-top:0">문제별 결과</div>';
  quizResults.forEach((r, i) => {
    const div = document.createElement('div');
    div.className = 'result-item';
    div.innerHTML = `
      <span class="result-icon">${r.isCorrect ? '✓' : '✗'}</span>
      <div>
        <div style="font-size:11px;color:var(--muted);font-family:'Space Mono',monospace">Q${i+1} · ${r.q.type==='composer'?'작곡가':'제목'} 맞히기</div>
        <div>${r.q.piece.composer} — ${r.q.piece.title.substring(0,50)}${r.q.piece.title.length>50?'…':''}</div>
        ${!r.isCorrect ? `<div style="font-size:12px;color:var(--red)">내 답: ${r.chosen}</div>` : ''}
      </div>
    `;
    bd.appendChild(div);
  });

  document.getElementById('quiz-results').classList.add('show');
}

function resetQuiz() {
  document.getElementById('quiz-results').classList.remove('show');
  document.getElementById('quiz-settings-area').style.display = '';
}

// ========== TABS ==========
function switchTab(name) {
  document.querySelectorAll('.tab-content').forEach(t => t.classList.remove('active'));
  document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
  document.getElementById('tab-'+name).classList.add('active');
  event.target.classList.add('active');
}

// Init
renderList(0);
</script>
